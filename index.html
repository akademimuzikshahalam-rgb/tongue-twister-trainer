<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">

  <title>Tongue Twister Trainer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .app-wrapper {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .header-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header-section h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
      font-weight: 700;
    }

    .header-section p {
      margin: 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .content-section {
      padding: 40px 30px;
    }

    .counter {
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
      text-align: center;
    }

    .main-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .twister-box {
      background: #f8f9ff;
      padding: 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      color: #333;
      line-height: 1.6;
      border: 2px solid #e0e0e0;
      width: 100%;
      text-align: center;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .twister-nav-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
    }

    .nav-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #f0f0f0;
      color: #333;
    }

    .nav-btn:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .back-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .mic-button {
      width: 100px;
      height: 100px;
      background: #ef4444;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .mic-button:hover:not(.listening) {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
    }

    .mic-button.listening {
      animation: pulse-button 1.5s infinite;
    }

    @keyframes pulse-button {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      50% {
        box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .status-text {
      color: #666;
      font-size: 16px;
      font-weight: 500;
      height: 24px;
      text-align: center;
      min-width: 200px;
    }

    .results-section {
      width: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      margin-top: 16px;
      padding-top: 24px;
      border-top: 2px solid #e0e0e0;
    }

    .results-section.show {
      opacity: 1;
      pointer-events: auto;
    }

    .results-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .transcript-box {
      background: #f8f9ff;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      color: #333;
      font-style: italic;
      font-size: 14px;
      min-height: 40px;
      width: 100%;
    }

    .score-display {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .score-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(#667eea var(--score-percent), #e0e0e0 var(--score-percent));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .score-inner {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
    }

    .feedback-text {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      min-height: 20px;
      text-align: center;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
    }

    .button-group button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .try-again-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .try-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .next-btn {
      background: #f0f0f0;
      color: #333;
    }

    .next-btn:hover {
      background: #e0e0e0;
    }
  </style>

 <body>
  <div class="app-wrapper">
   <div class="card">
    <div class="header-section">
     <h1>🗣️ Tongue Twister Trainer</h1>
     <p>Practice speaking clearly</p>
    </div>
    <div class="content-section">
     <div style="font-size: 14px; color: #333; font-weight: 700; text-align: center; margin-bottom: 16px;" id="teacher-tip">
      Cakap Betul Betul, Bulat Bulat!
     </div>
     <div class="counter">
      Challenge <span id="twister-number">1</span> of <span id="total-twisters">5</span>
     </div>
     <div class="main-layout">
      <div class="twister-box" id="tongue-twister">
       She sells seashells by the seashore
      </div>
      <div class="twister-nav-buttons"><button class="nav-btn back-btn" id="back-btn">← Back</button> <button class="nav-btn next-btn-twister" id="next-btn-twister">Next →</button>
      </div>
      <div class="control-section">
       <button class="mic-button" id="record-btn">🎤</button>
       <div class="status-text" id="record-status">
        Tap to start recording
       </div>
      </div>
      <div class="results-section" id="results">
       <div class="results-label">
        What Teacher Gilbert Heard
       </div>
       <div class="transcript-box" id="transcript"></div>
       <div class="score-display">
        <div class="score-ring" id="score-ring" style="--score-percent: 0%">
         <div class="score-inner">
          <span id="score-value">0</span>
         </div>
        </div>
       </div>
       <div class="feedback-text" id="feedback"></div>
       <div class="button-group"><button class="try-again-btn" id="try-again">Try Again</button> <button class="next-btn" id="next-btn">Next</button>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const tongueTwisters = [
      "She sells seashells by the seashore, and the shells she sells are seashells, I'm sure",
      "Peter Piper picked a peck of pickled peppers, and if Peter Piper picked a peck of pickled peppers, where's the peck of pickled peppers Peter Piper picked",
      "Red lorry, yellow lorry, red lorry, yellow lorry, red lorry, yellow lorry",
      "Unique New York unique New York unique New York you need New York",
      "How much wood would a woodchuck chuck if a woodchuck could chuck wood, he would chuck as much wood as a woodchuck could chuck if a woodchuck could chuck wood"
    ];

    const teacherTips = [
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!"
    ];

    let currentIndex = 0;
    let recognition = null;
    let isRecording = false;
    let transcript = "";

    const twisterText = document.getElementById("tongue-twister");
    const numberText = document.getElementById("twister-number");
    const totalText = document.getElementById("total-twisters");
    const recordBtn = document.getElementById("record-btn");
    const statusText = document.getElementById("record-status");
    const resultBox = document.getElementById("results");
    const transcriptBox = document.getElementById("transcript");
    const scoreRing = document.getElementById("score-ring");
    const scoreValue = document.getElementById("score-value");
    const feedbackBox = document.getElementById("feedback");

    totalText.innerText = tongueTwisters.length;

    function updateTwister() {
      twisterText.innerText = tongueTwisters[currentIndex];
      numberText.innerText = currentIndex + 1;
      document.getElementById("teacher-tip").innerText = teacherTips[currentIndex];
    }

    updateTwister();

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusText.innerText = "⚠️ Speech recognition not supported. Use Chrome, Edge, or Safari.";
        return false;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";

      recognition.onresult = (e) => {
        transcript = e.results[e.results.length - 1][0].transcript;
        showResult();
      };

      recognition.onerror = (e) => {
        console.error("Speech Recognition Error Details:", {
          error: e.error,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          protocol: window.location.protocol
        });
        
        let errorMsg = `❌ Error: ${e.error}`;
        if (e.error === "not-allowed") {
          errorMsg = "❌ Permission denied. Microphone access blocked.";
        } else if (e.error === "no-speech") {
          errorMsg = "❌ No speech detected. Try speaking louder.";
        } else if (e.error === "network") {
          errorMsg = "❌ Network error. Check your connection.";
        } else if (e.error === "service-not-allowed") {
          errorMsg = "❌ Service not allowed in this context.";
        }
        
        statusText.innerText = errorMsg;
        stopRecording();
      };

      return true;
    }

    function startRecording() {
      if (!recognition) {
        initRecognition().then(ok => {
          if (ok) startRecording();
        });
        return;
      }

      isRecording = true;
      recordBtn.classList.add("listening");
      statusText.innerText = "Listening...";
      recognition.start();
    }

    function stopRecording() {
      isRecording = false;
      recordBtn.classList.remove("listening");
      recognition.stop();
    }

    recordBtn.addEventListener("click", () => {
      if (!recognition) {
        const ok = initRecognition();
        if (!ok) {
          return;
        }
      }

      if (isRecording) {
        stopRecording();
      } else {
        // If results are showing, reset them first
        if (resultBox.classList.contains("show")) {
          resultBox.classList.remove("show");
          statusText.innerText = "Listening...";
          recognition.start();
          isRecording = true;
          recordBtn.classList.add("listening");
        } else {
          startRecording();
        }
      }
    });

    function calculateScore(original, spoken) {
      const o = original.toLowerCase().split(/\s+/).filter(w => w.length > 0);
      const s = spoken.toLowerCase().split(/\s+/).filter(w => w.length > 0);

      // Must capture at least 70% of words or get a low score
      if (s.length < o.length * 0.7) {
        return 3;
      }

      let exactMatches = 0;
      let partialMatches = 0;
      
      // Check each original word
      o.forEach(word => {
        const found = s.find(w => w === word);
        if (found) {
          exactMatches++;
        } else {
          // Give partial credit if word is at least 60% similar
          const similarity = findSimilarity(word, s);
          if (similarity >= 0.6) {
            partialMatches += 0.5;
          }
        }
      });

      // Calculate score: exact matches weighted heavily, partials less
      let accuracy = (exactMatches + partialMatches) / o.length;
      let score = Math.round(accuracy * 10);

      // Cap at 10, minimum 1
      if (score < 1) score = 1;
      if (score > 10) score = 10;

      return score;
    }

    function findSimilarity(word, spokenWords) {
      let maxSimilarity = 0;
      spokenWords.forEach(spoken => {
        const similarity = levenshteinSimilarity(word, spoken);
        if (similarity > maxSimilarity) {
          maxSimilarity = similarity;
        }
      });
      return maxSimilarity;
    }

    function levenshteinSimilarity(a, b) {
      const longer = a.length > b.length ? a : b;
      const shorter = a.length > b.length ? b : a;
      if (longer.length === 0) return 1;
      
      const editDistance = getEditDistance(longer, shorter);
      return (longer.length - editDistance) / longer.length;
    }

    function getEditDistance(a, b) {
      const costs = [];
      for (let i = 0; i <= a.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= b.length; j++) {
          if (i === 0) {
            costs[j] = j;
          } else if (j > 0) {
            let newValue = costs[j - 1];
            if (a.charAt(i - 1) !== b.charAt(j - 1)) {
              newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
            }
            costs[j - 1] = lastValue;
            lastValue = newValue;
          }
        }
        if (i > 0) costs[b.length] = lastValue;
      }
      return costs[b.length];
    }

    function showResult() {
      const original = tongueTwisters[currentIndex];
      const score = calculateScore(original, transcript);

      transcriptBox.innerText = transcript;
      scoreValue.innerText = score;
      scoreRing.style.setProperty("--score-percent", (score * 10) + "%");

      let feedback = "";
      if (score >= 9) feedback = "🌟 Perfect pronunciation!";
      else if (score >= 7) feedback = "👏 Very clear speech!";
      else if (score >= 5) feedback = "👍 Good effort. Try again!";
      else feedback = "💪 Slow down and pronounce each word clearly.";

      feedbackBox.innerText = feedback;
      resultBox.classList.add("show");
      statusText.innerText = "Tap to record again";
    }

    document.getElementById("try-again").addEventListener("click", () => {
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
    });

    const backBtn = document.getElementById("back-btn");
    const nextTwisterBtn = document.getElementById("next-btn-twister");

    backBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + tongueTwisters.length) % tongueTwisters.length;
      updateTwister();
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
      updateNavButtons();
    });

    nextTwisterBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % tongueTwisters.length;
      updateTwister();
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
      updateNavButtons();
    });

    function updateNavButtons() {
      backBtn.disabled = currentIndex === 0;
    }

    updateNavButtons();
  </script>
