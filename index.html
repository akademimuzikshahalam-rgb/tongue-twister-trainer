 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tongue Twister Trainer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .app-wrapper {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      overflow-auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .header-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      text-align: center;
    }

    .header-section h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .header-section p {
      margin: 2px 0 0 0;
      opacity: 0.9;
      font-size: 11px;
    }

    .content-section {
      padding: 12px 16px;
    }

    .counter {
      font-size: 10px;
      color: #999;
      margin-bottom: 6px;
      text-align: center;
    }

    .main-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .twister-box {
      background: #f8f9ff;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      line-height: 1.3;
      border: 2px solid #e0e0e0;
      width: 100%;
      text-align: center;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .twister-nav-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .nav-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #f0f0f0;
      color: #333;
    }

    .nav-btn:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .back-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .mic-button {
      width: 70px;
      height: 70px;
      background: #ef4444;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 35px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .mic-button:hover:not(.listening) {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
    }

    .mic-button.listening {
      animation: pulse-button 1.5s infinite;
    }

    @keyframes pulse-button {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .status-text {
      color: #666;
      font-size: 13px;
      font-weight: 500;
      height: 18px;
      text-align: center;
      min-width: 150px;
    }

    .results-section {
      width: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 2px solid #e0e0e0;
    }

    .results-section.show {
      opacity: 1;
      pointer-events: auto;
    }

    .results-label {
      font-size: 10px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .transcript-box {
      background: #f8f9ff;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      color: #333;
      font-style: italic;
      font-size: 12px;
      min-height: 30px;
      width: 100%;
    }

    .score-display {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .score-ring {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: conic-gradient(#667eea var(--score-percent), #e0e0e0 var(--score-percent));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .score-inner {
      width: 62px;
      height: 62px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #667eea;
    }

    .feedback-text {
      color: #666;
      font-size: 12px;
      margin-bottom: 10px;
      min-height: 16px;
      text-align: center;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .button-group button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .try-again-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .try-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(102, 126, 234, 0.3);
    }

    .next-btn {
      background: #f0f0f0;
      color: #333;
    }

    .next-btn:hover {
      background: #e0e0e0;
    }

    #teacher-tip {
      font-size: 12px;
      color: #333;
      font-weight: 700;
      text-align: center;
      margin: 0;
    }

    .logo-box {
      height: 40px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box img {
      max-height: 32px;
      width: auto;
      object-fit: contain;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    @keyframes confetti-spin {
      to {
        transform: rotateZ(720deg);
      }
    }

    .confetti-piece {
      animation: confetti-fall 2s ease-in forwards;
    }

    .confetti-sparkle {
      animation: confetti-spin 2s linear, confetti-fall 2s ease-in forwards;
    }

    @keyframes firework-burst {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .firework {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
    }
  </style>

 <body>
  <div class="app-wrapper">
   <div class="card">
    <div class="header-section">
     <div class="logo-box">
      <img src="https://i.imgur.com/dm9RVTU.png" alt="Speak Up logo" loading="lazy">
     </div>
     <h1>Tongue Twister Trainer</h1>
     <p>Practice speaking clearly</p>
    </div>
    <div class="content-section">
     <div class="counter">
      Challenge <span id="twister-number">1</span> of <span id="total-twisters">5</span>
     </div>
     <div class="main-layout">
      <div class="twister-box" id="tongue-twister">
       She sells seashells at the seashore, the shells she sells are surely seashells
      </div>
      <div id="teacher-tip">
       Cakap Betul Betul, Bulat Bulat!
      </div>
      <div class="twister-nav-buttons">
       <button class="nav-btn back-btn" id="back-btn">← Back</button> <button class="nav-btn next-btn-twister" id="next-btn-twister">Next →</button>
      </div>
      <div class="control-section">
       <button class="mic-button" id="record-btn">
        <svg width="40" height="40" viewbox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M25 35C29.4183 35 33 31.4183 33 27V15C33 10.5817 29.4183 7 25 7C20.5817 7 17 10.5817 17 15V27C17 31.4183 20.5817 35 25 35Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <path d="M14 27C14 32 18.5 36.5 25 36.5C31.5 36.5 36 32 36 27" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <path d="M25 36.5V43" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <path d="M19 43H31" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg></button>
       <div class="status-text" id="record-status">
        Tap to start recording
       </div>
      </div>
      <div class="results-section" id="results">
       <div class="results-label">
        What Teacher Gilbert Heard
       </div>
       <div class="transcript-box" id="transcript"></div>
       <div class="score-display">
        <div class="score-ring" id="score-ring" style="--score-percent: 0%">
         <div class="score-inner"><span id="score-value">0</span>
         </div>
        </div>
       </div>
       <div class="feedback-text" id="feedback"></div>
       <div class="button-group">
        <button class="try-again-btn" id="try-again">Try Again</button> <button class="next-btn" id="next-btn">Next</button>
       </div>
      </div>
     </div>
    </div>
   </div>

  <script>
    const tongueTwisters = [
      "She sells seashells at the seashore, the shells she sells are surely seashells",
      "Peter Piper picked a peck of pickled peppers, a peck of pickled peppers Peter Piper picked",
      "Red lorry, yellow lorry, red lorry, yellow lorry, red lorry, yellow lorry",
      "Unique New York unique New York unique New York you need New York",
      "How much wood would a woodchuck chuck if a woodchuck could chuck wood, he would chuck as much wood as a woodchuck could chuck if a woodchuck could chuck wood"
    ];

    const teacherTips = [
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!",
      "Cakap Betul Betul, Bulat Bulat!"
    ];

    let currentIndex = 0;
    let recognition = null;
    let isRecording = false;
    let transcript = "";

    const twisterText = document.getElementById("tongue-twister");
    const numberText = document.getElementById("twister-number");
    const totalText = document.getElementById("total-twisters");
    const recordBtn = document.getElementById("record-btn");
    const statusText = document.getElementById("record-status");
    const resultBox = document.getElementById("results");
    const transcriptBox = document.getElementById("transcript");
    const scoreRing = document.getElementById("score-ring");
    const scoreValue = document.getElementById("score-value");
    const feedbackBox = document.getElementById("feedback");

    totalText.innerText = tongueTwisters.length;

    function updateTwister() {
      twisterText.innerText = tongueTwisters[currentIndex];
      numberText.innerText = currentIndex + 1;
      document.getElementById("teacher-tip").innerText = teacherTips[currentIndex];
    }

    updateTwister();

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusText.innerText = "⚠️ Speech recognition not supported. Use Chrome, Edge, or Safari.";
        return false;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";

      recognition.onresult = (e) => {
        transcript = e.results[e.results.length - 1][0].transcript;
        showResult();
      };

      recognition.onerror = (e) => {
        console.error("Speech Recognition Error Details:", {
          error: e.error,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          protocol: window.location.protocol
        });
        
        let errorMsg = `❌ Error: ${e.error}`;
        if (e.error === "not-allowed") {
          errorMsg = "❌ Permission denied. Microphone access blocked.";
        } else if (e.error === "no-speech") {
          errorMsg = "❌ No speech detected. Try speaking louder.";
        } else if (e.error === "network") {
          errorMsg = "❌ Network error. Check your connection.";
        } else if (e.error === "service-not-allowed") {
          errorMsg = "❌ Service not allowed in this context.";
        }
        
        statusText.innerText = errorMsg;
        stopRecording();
      };

      return true;
    }

    function startRecording() {
      if (!recognition) {
        initRecognition();
        if (!recognition) return;
      }

      isRecording = true;
      recordBtn.classList.add("listening");
      statusText.innerText = "Listening...";
      recognition.start();
    }

    function stopRecording() {
      isRecording = false;
      recordBtn.classList.remove("listening");
      if (recognition) recognition.stop();
    }

    recordBtn.addEventListener("click", () => {
      if (!recognition) {
        const ok = initRecognition();
        if (!ok) {
          return;
        }
      }

      if (isRecording) {
        stopRecording();
      } else {
        if (resultBox.classList.contains("show")) {
          resultBox.classList.remove("show");
          statusText.innerText = "Listening...";
          recognition.start();
          isRecording = true;
          recordBtn.classList.add("listening");
        } else {
          startRecording();
        }
      }
    });

    function calculateScore(original, spoken) {
      const o = original.toLowerCase().split(/\s+/).filter(w => w.length > 0);
      const s = spoken.toLowerCase().split(/\s+/).filter(w => w.length > 0);

      if (s.length < o.length * 0.7) {
        return 3;
      }

      let exactMatches = 0;
      let partialMatches = 0;
      
      o.forEach(word => {
        const found = s.find(w => w === word);
        if (found) {
          exactMatches++;
        } else {
          const similarity = findSimilarity(word, s);
          if (similarity >= 0.6) {
            partialMatches += 0.5;
          }
        }
      });

      let accuracy = (exactMatches + partialMatches) / o.length;
      let score = Math.round(accuracy * 10);

      if (score < 1) score = 1;
      if (score > 10) score = 10;

      return score;
    }

    function findSimilarity(word, spokenWords) {
      let maxSimilarity = 0;
      spokenWords.forEach(spoken => {
        const similarity = levenshteinSimilarity(word, spoken);
        if (similarity > maxSimilarity) {
          maxSimilarity = similarity;
        }
      });
      return maxSimilarity;
    }

    function levenshteinSimilarity(a, b) {
      const longer = a.length > b.length ? a : b;
      const shorter = a.length > b.length ? b : a;
      if (longer.length === 0) return 1;
      
      const editDistance = getEditDistance(longer, shorter);
      return (longer.length - editDistance) / longer.length;
    }

    function getEditDistance(a, b) {
      const costs = [];
      for (let i = 0; i <= a.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= b.length; j++) {
          if (i === 0) {
            costs[j] = j;
          } else if (j > 0) {
            let newValue = costs[j - 1];
            if (a.charAt(i - 1) !== b.charAt(j - 1)) {
              newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
            }
            costs[j - 1] = lastValue;
            lastValue = newValue;
          }
        }
        if (i > 0) costs[b.length] = lastValue;
      }
      return costs[b.length];
    }

    function showResult() {
      const original = tongueTwisters[currentIndex];
      const score = calculateScore(original, transcript);

      transcriptBox.innerText = transcript;
      scoreValue.innerText = score;
      scoreRing.style.setProperty("--score-percent", (score * 10) + "%");

      let feedback = "";
      if (score >= 9) feedback = "🌟 Perfect pronunciation!";
      else if (score >= 7) feedback = "👏 Very clear speech!";
      else if (score >= 5) feedback = "👍 Good effort. Try again!";
      else feedback = "💪 Slow down and pronounce each word clearly.";

      feedbackBox.innerText = feedback;
      resultBox.classList.add("show");
      statusText.innerText = "Tap to record again";
      
      // Trigger celebration
      celebrateScore(score);
    }

    document.getElementById("try-again").addEventListener("click", () => {
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
    });

    const backBtn = document.getElementById("back-btn");
    const nextTwisterBtn = document.getElementById("next-btn-twister");

    backBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + tongueTwisters.length) % tongueTwisters.length;
      updateTwister();
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
      updateNavButtons();
    });

    nextTwisterBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % tongueTwisters.length;
      updateTwister();
      resultBox.classList.remove("show");
      statusText.innerText = "Tap to start recording";
      updateNavButtons();
    });

    function updateNavButtons() {
      backBtn.disabled = currentIndex === 0;
    }

    updateNavButtons();

    // ===== CELEBRATION FUNCTIONS =====
    function playSuccessSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
      
      notes.forEach((freq, idx) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        osc.start(audioContext.currentTime + idx * 0.1);
        osc.stop(audioContext.currentTime + idx * 0.1 + 0.3);
      });
    }

    function createConfetti(count, colors) {
      const container = document.body;
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti confetti-piece';
        piece.style.left = Math.random() * window.innerWidth + 'px';
        piece.style.top = '-10px';
        piece.style.width = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 8 + 4) + 'px';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        piece.style.animationDuration = (Math.random() * 0.5 + 1.8) + 's';
        piece.style.animationDelay = (Math.random() * 0.3) + 's';
        container.appendChild(piece);
        
        setTimeout(() => piece.remove(), 2500);
      }
    }

    function createFireworks(x, y) {
      const sparkCount = 30;
      const colors = ['#FFD700', '#FFA500', '#FF69B4', '#00D9FF', '#FF1493'];
      
      for (let i = 0; i < sparkCount; i++) {
        const spark = document.createElement('div');
        spark.className = 'firework';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        spark.style.width = '6px';
        spark.style.height = '6px';
        spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        spark.style.borderRadius = '50%';
        spark.style.boxShadow = '0 0 6px ' + colors[Math.floor(Math.random() * colors.length)];
        
        const angle = (i / sparkCount) * Math.PI * 2;
        const velocity = 5 + Math.random() * 5;
        const vx = Math.cos(angle) * velocity;
        const vy = Math.sin(angle) * velocity;
        
        document.body.appendChild(spark);
        
        let px = x, py = y, vx2 = vx, vy2 = vy;
        const startTime = Date.now();
        
        const animate = () => {
          const elapsed = Date.now() - startTime;
          if (elapsed > 1000) {
            spark.remove();
            return;
          }
          
          px += vx2;
          py += vy2;
          vy2 += 0.2; // gravity
          
          spark.style.left = px + 'px';
          spark.style.top = py + 'px';
          spark.style.opacity = 1 - (elapsed / 1000);
          
          requestAnimationFrame(animate);
        };
        animate();
      }
    }

    function celebrateScore(score) {
      if (score >= 10) {
        // Perfect 10 - maximum celebration
        createConfetti(80, ['#FFD700', '#FFA500', '#FF69B4', '#00D9FF']);
        
        // Multiple fireworks bursts
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * (window.innerHeight * 0.6) + 100;
            createFireworks(x, y);
          }, i * 200);
        }
        
        playSuccessSound();
      } else if (score >= 9) {
        // 9 marks - more confetti
        createConfetti(50, ['#FFD700', '#FF69B4', '#00D9FF', '#90EE90']);
        createFireworks(window.innerWidth / 2, window.innerHeight / 3);
      } else if (score >= 8) {
        // 8 marks - moderate confetti
        createConfetti(30, ['#667eea', '#764ba2', '#90EE90', '#FFD700']);
      }
    }
