<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tongue Twister Trainer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
background:white;
max-width:500px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.twister{
font-size:18px;
font-weight:600;
text-align:center;
padding:12px;
border:2px solid #e0e0e0;
border-radius:10px;
background:#f8f9ff;
}

.mic{
width:70px;
height:70px;
border-radius:50%;
background:#22c55e;
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-top:20px;
cursor:pointer;
transition:0.2s;
}

.mic.listening{
background:#ef4444;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}
70%{box-shadow:0 0 0 15px rgba(239,68,68,0)}
100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
}

.score{
font-size:28px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.feedback{
text-align:center;
font-size:14px;
margin-top:6px;
color:#555;
}

button{
padding:8px 16px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2 class="text-center text-xl font-bold mb-3">Tongue Twister Trainer</h2>

<div id="twister" class="twister"></div>

<div id="recordBtn" class="mic">🎤</div>

<p id="status" class="text-center mt-2">Tap to start recording</p>

<div id="result" style="display:none">

<div id="transcript" class="mt-3 text-center italic"></div>

<div id="score" class="score"></div>

<div id="feedback" class="feedback"></div>

</div>

<div class="flex justify-between mt-4">

<button onclick="prevTwister()">← Back</button>

<button onclick="nextTwister()">Next →</button>

</div>

</div>

<script>

const tongueTwisters=[
"She sells seashells at the seashore",
"Peter Piper picked a peck of pickled peppers",
"Red lorry yellow lorry red lorry yellow lorry",
"Unique New York unique New York",
"How much wood would a woodchuck chuck"
]

let index=0
let recognition
let startTime=0
let isRecording=false

const twister=document.getElementById("twister")
const recordBtn=document.getElementById("recordBtn")
const status=document.getElementById("status")
const transcriptBox=document.getElementById("transcript")
const scoreBox=document.getElementById("score")
const feedbackBox=document.getElementById("feedback")
const result=document.getElementById("result")

function updateTwister(){
twister.innerText=tongueTwisters[index]
}

updateTwister()

function initRecognition(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(!SpeechRecognition){
status.innerText="Speech recognition not supported in this browser"
return
}

recognition=new SpeechRecognition()

recognition.lang="en-US"
recognition.continuous=false
recognition.interimResults=false

recognition.onresult=(e)=>{

const spoken=e.results[0][0].transcript

const duration=(Date.now()-startTime)/1000

showResult(spoken,duration)

stopRecording()

}

}

function startRecording(){

if(!recognition) initRecognition()

startTime=Date.now()

isRecording=true

recordBtn.classList.add("listening")

status.innerText="Listening..."

recognition.start()

}

function stopRecording(){

isRecording=false

recordBtn.classList.remove("listening")

}

recordBtn.onclick=()=>{

if(isRecording){

recognition.stop()
stopRecording()

}else{

startRecording()

}

}

function levenshtein(a,b){

const matrix=[]

for(let i=0;i<=b.length;i++){
matrix[i]=[i]
}

for(let j=0;j<=a.length;j++){
matrix[0][j]=j
}

for(let i=1;i<=b.length;i++){
for(let j=1;j<=a.length;j++){

if(b.charAt(i-1)==a.charAt(j-1)){

matrix[i][j]=matrix[i-1][j-1]

}else{

matrix[i][j]=Math.min(
matrix[i-1][j-1]+1,
matrix[i][j-1]+1,
matrix[i-1][j]+1
)

}

}
}

return matrix[b.length][a.length]

}

function similarity(a,b){

const distance=levenshtein(a,b)

return (Math.max(a.length,b.length)-distance)/Math.max(a.length,b.length)

}

function calculateScore(original,spoken,duration){

const originalWords=original.toLowerCase().split(" ")
const spokenWords=spoken.toLowerCase().split(" ")

let exact=0
let similarityScore=0

originalWords.forEach(word=>{

let best=0

spokenWords.forEach(sw=>{

const sim=similarity(word,sw)

if(sim>best) best=sim

})

if(best>0.9) exact++

similarityScore+=best

})

const accuracy=exact/originalWords.length
const pronunciation=similarityScore/originalWords.length
const completeness=Math.min(spokenWords.length/originalWords.length,1)

let speedScore=1

if(duration>6) speedScore=0.7
if(duration>8) speedScore=0.5

let total=(accuracy*0.5)+(pronunciation*0.2)+(completeness*0.2)+(speedScore*0.1)

let score=Math.round(total*10)

if(score<1) score=1
if(score>10) score=10

return score

}

function showResult(spoken,duration){

const original=tongueTwisters[index]

const score=calculateScore(original,spoken,duration)

transcriptBox.innerText='"'+spoken+'"'

scoreBox.innerText=score+"/10"

let feedback=""

if(score>=9) feedback="🌟 Excellent pronunciation!"
else if(score>=7) feedback="👏 Very clear speech"
else if(score>=5) feedback="👍 Good effort — try again"
else feedback="💪 Slow down and pronounce clearly"

feedbackBox.innerText=feedback

result.style.display="block"

status.innerText="Tap to try again"

}

function nextTwister(){

index=(index+1)%tongueTwisters.length

updateTwister()

result.style.display="none"

status.innerText="Tap to start recording"

}

function prevTwister(){

index=(index-1+tongueTwisters.length)%tongueTwisters.length

updateTwister()

result.style.display="none"

status.innerText="Tap to start recording"

}

</script>

</body>
</html>
