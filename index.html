<div style="height: 70px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center;">
  <div style="background: rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 6px 10px; display: flex; align-items: center; justify-content: center;">
    <img
      id="speakup-logo"
      src="https://i.imgur.com/dm9RVTU.png"
      alt="Speak Up logo"
      style="max-height:48px; width:auto; object-fit:contain; display:block;"
      loading="eager"
      onerror="(function(el){
         if(el.dataset.fallback==='used'){ 
           el.style.display='none';
           var sv = document.createElement('div');
           sv.innerHTML = '<svg width=\"56\" height=\"56\" viewBox=\"0 0 200 200\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"12\" y=\"24\" width=\"176\" height=\"100\" rx=\"18\" fill=\"#fff\"/><text x=\"50%\" y=\"65%\" text-anchor=\"middle\" font-family=\"Poppins, sans-serif\" font-size=\"18\" fill=\"#667eea\">Speak Up</text></svg>';
           el.parentNode.appendChild(sv);
           return;
         }
         el.dataset.fallback = 'used';
         el.src = 'https://i.ibb.co/Wv2CSkrM/Speak-Up-Logo.png';
      })(this);">
  </div>
</div>
