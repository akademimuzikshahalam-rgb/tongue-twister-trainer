<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tongue Twister Trainer — Score Ring + Fireworks</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    h1,h2,h3 { font-family: 'Poppins', sans-serif; }
    html,body { height:100%; margin:0; padding:0; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); transition: background .3s ease; }
    .app-wrapper { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px; }
    .card { background:white; border-radius:12px; width:100%; max-width:920px; box-shadow:0 10px 30px rgba(0,0,0,0.14); overflow:hidden; }
    .header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:18px; text-align:center; }
    .header h1 { margin:0; font-size:22px; font-weight:700; }
    .content { padding:16px; display:grid; grid-template-columns: 1fr 320px; gap:18px; align-items:start; }

    .twister-box { background:#f8fafc; padding:14px; border-radius:10px; font-size:20px; font-weight:700; color:#0f172a; border:1px solid #e6eefc; text-align:center; }
    .teacher-tip { text-align:center; margin-top:8px; font-weight:700; color:#111827; }

    /* controls */
    .controls { margin-top:12px; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .mic-button { width:112px; height:112px; background:#22c55e; border-radius:999px; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.12); }
    .mic-button.listening { background:#ef4444; animation:pulse-button 1.4s infinite; }
    @keyframes pulse-button { 0% { box-shadow:0 0 0 0 rgba(239,68,68,0.7);} 50% { box-shadow:0 0 0 12px rgba(239,68,68,0);} 100% { box-shadow:0 0 0 0 rgba(239,68,68,0); } }

    .status-row { display:flex; gap:12px; align-items:center; justify-content:center; width:100%; }
    .status-text { color:#0f172a; font-weight:700; min-width:220px; text-align:center; }
    .mic-permission { font-size:12px; color:#6b7280; text-align:center; }

    canvas#mic-meter { width:220px; height:18px; border-radius:9px; }

    .live-transcript { background:#f8fafc; padding:10px; border-radius:8px; font-style:italic; font-weight:700; min-height:36px; width:100%; display:none; margin-top:8px; color:#0f172a; }

    /* right column: score ring + details */
    .right-column { background:#ffffff; border-left:1px solid #eef2ff; padding:18px; display:flex; flex-direction:column; gap:12px; align-items:center; }
    .score-panel { display:flex; flex-direction:column; align-items:center; gap:8px; }

    /* SVG circular ring */
    .score-ring-wrapper { position:relative; width:160px; height:160px; }
    svg.score-ring { transform: rotate(-90deg); width:160px; height:160px; display:block; }
    .score-center { position:absolute; left:0; right:0; top:0; bottom:0; display:flex; align-items:center; justify-content:center; flex-direction:column; pointer-events:none; }
    .score-number { font-size:36px; font-weight:900; color:#0f172a; text-shadow:0 1px 0 rgba(255,255,255,0.6); }
    .score-label { font-size:12px; color:#6b7280; font-weight:700; text-transform:uppercase; }

    .results-section { width:100%; display:flex; flex-direction:column; gap:8px; align-items:center; margin-top:8px; }
    .feedback { font-weight:700; color:#0f172a; text-align:center; }

    /* fireworks / confetti overlay */
    .overlay { position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; z-index:9999; overflow:hidden; }
    .confetti-piece { position:absolute; width:8px; height:8px; opacity:0.95; border-radius:2px; }
    .firework-spark { position:absolute; width:6px; height:6px; border-radius:50%; box-shadow:0 0 8px rgba(255,255,255,0.9); }

    footer { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:12px; text-align:center; font-weight:700; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="card" role="application" aria-label="Tongue Twister Trainer">
      <div class="header">
        <h1>Tongue Twister Trainer</h1>
      </div>

      <div class="content">
        <!-- left: twister + controls -->
        <div>
          <div class="twister-box" id="tongue-twister">She sells seashells at the seashore, the shells she sells are surely seashells</div>
          <div class="teacher-tip" id="teacher-tip">Cakap betul-betul, bulat-bulat!</div>

          <div class="controls" aria-live="polite">
            <div style="display:flex;gap:18px;align-items:center;justify-content:center;">
              <button id="record-btn" class="mic-button" aria-pressed="false" title="Record / Stop">
                <!-- mic icon -->
                <svg width="56" height="56" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M25 35C29.4183 35 33 31.4183 33 27V15C33 10.5817 29.4183 7 25 7C20.5817 7 17 10.5817 17 15V27C17 31.4183 20.5817 35 25 35Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 27C14 32 18.5 36.5 25 36.5C31.5 36.5 36 32 36 27" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M25 36.5V43" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 43H31" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

              <div>
                <div class="status-row">
                  <div id="record-status" class="status-text">Tap to start recording</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;">
                  <div id="mic-permission" class="mic-permission">Mic: unknown</div>
                  <canvas id="mic-meter" width="220" height="18" aria-hidden="true"></canvas>
                </div>
              </div>
            </div>

            <div id="live-transcript" class="live-transcript" aria-live="polite"></div>
          </div>
        </div>

        <!-- right column: score ring and actions -->
        <div class="right-column" aria-hidden="false">
          <div class="score-panel" role="status" aria-live="polite">
            <div class="score-ring-wrapper" aria-hidden="false">
              <svg class="score-ring" viewBox="0 0 120 120" role="img" aria-labelledby="scoreTitle scoreDesc">
                <title id="scoreTitle">Pronunciation score</title>
                <desc id="scoreDesc">Circular progress ring showing score out of ten</desc>
                <!-- background track -->
                <circle cx="60" cy="60" r="48" stroke="#eef2ff" stroke-width="12" fill="none"></circle>
                <!-- progress circle (animated) -->
                <circle id="progress-circle" cx="60" cy="60" r="48" stroke="#60a5fa" stroke-width="12" stroke-linecap="round" fill="none" stroke-dasharray="301.59" stroke-dashoffset="301.59"></circle>
              </svg>
              <div class="score-center">
                <div id="score-number" class="score-number">0</div>
                <div class="score-label">Score / 10</div>
              </div>
            </div>

            <div class="results-section" id="results-section" aria-hidden="true">
              <div id="feedback" class="feedback">No result yet — try recording</div>
            </div>
          </div>
        </div>
      </div>

      <footer>Created by Teacher Gilbert</footer>
    </div>
  </div>

  <!-- overlay for fireworks/confetti -->
  <div id="overlay" class="overlay" aria-hidden="true"></div>

<script>
/* =========================
   Core state & UI refs
   ========================= */
const tongueTwistersByDifficulty = {
  medium: ["She sells seashells at the seashore, the shells she sells are surely seashells","Peter Piper picked a peck of pickled peppers, a peck of pickled peppers Peter Piper picked","Red lorry, yellow lorry, red lorry, yellow lorry, red lorry, yellow lorry","Unique New York unique New York unique New York you need New York","How much wood would a woodchuck chuck if a woodchuck could chuck wood"]
};
let currentDifficulty = 'medium';
let currentIndex = 0;

const recordBtn = document.getElementById('record-btn');
const recordStatus = document.getElementById('record-status');
const liveTranscript = document.getElementById('live-transcript');
const micPermission = document.getElementById('mic-permission');
const micMeterCanvas = document.getElementById('mic-meter');
const feedbackBox = document.getElementById('feedback');
const resultsSection = document.getElementById('results-section');
const progressCircle = document.getElementById('progress-circle');
const scoreNumber = document.getElementById('score-number');
const overlay = document.getElementById('overlay');

document.getElementById('tongue-twister').innerText = tongueTwistersByDifficulty[currentDifficulty][currentIndex];
document.getElementById('twister-number')?.replaceWith ? document.getElementById('twister-number').innerText = currentIndex+1 : null;

/* =========================
   SpeechRecognition + mic meter
   ========================= */
let recognition = null;
let isRecording = false;
let transcript = '';
let silenceTimeout = null;
const SILENCE_THRESHOLD = 2000;

// meter
let audioContext = null;
let analyser = null;
let meterStream = null;
let meterAnim = null;

/* helpers for permission text */
function setMicPermission(text){ micPermission.innerText = `Mic: ${text}`; }

/* init recognition */
function initRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    recordStatus.innerText = "⚠️ SpeechRecognition not supported (use Chrome/Edge)";
    setMicPermission('not supported');
    return false;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    recordBtn.classList.add('listening');
    recordBtn.setAttribute('aria-pressed','true');
    recordStatus.innerText = '🎤 Listening...';
    liveTranscript.style.display = 'block';
    liveTranscript.innerText = '';
  };

  recognition.onresult = (e) => {
    if (silenceTimeout) clearTimeout(silenceTimeout);
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const seg = e.results[i][0].transcript.trim();
      if(!seg) continue;
      if(e.results[i].isFinal) transcript += seg + ' ';
      else interim += seg + ' ';
    }
    const display = (transcript + interim).trim();
    if(display){
      liveTranscript.innerText = display;
      liveTranscript.style.display = 'block';
    }
    silenceTimeout = setTimeout(() => {
      if((transcript||'').trim().length > 0){
        stopRecording();
        showResult();
      }
    }, SILENCE_THRESHOLD);
  };

  recognition.onend = () => {
    // keep UI consistent — if isRecording was true, try to restart once
    if(isRecording){
      try {
        recognition.start();
      } catch (err) {
        console.warn('recognition restart failed', err);
        isRecording = false;
        recordBtn.classList.remove('listening');
        recordBtn.setAttribute('aria-pressed','false');
        recordStatus.innerText = 'Tap to start recording';
      }
    } else {
      recordBtn.classList.remove('listening');
      recordBtn.setAttribute('aria-pressed','false');
      recordStatus.innerText = 'Tap to start recording';
    }
  };

  recognition.onerror = (e) => {
    console.warn('recognition error', e);
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      setMicPermission('blocked - enable microphone in site settings');
      recordStatus.innerText = '❌ Microphone blocked';
    } else if(e.error === 'no-speech'){
      recordStatus.innerText = '❌ No speech detected';
    } else {
      recordStatus.innerText = `❌ Error: ${e.error}`;
    }
    isRecording = false;
    recordBtn.classList.remove('listening');
    stopMicMeter();
  };

  return true;
}

/* mic meter start */
async function startMicMeter(){
  try {
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ setMicPermission('getUserMedia not available'); return false; }
    if(meterStream) return true;
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    meterStream = s;
    setMicPermission('allowed');

    if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();

    const src = audioContext.createMediaStreamSource(s);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    src.connect(analyser);

    const canvas = micMeterCanvas;
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const data = new Uint8Array(analyser.fftSize);

    function draw(){
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for(let i=0;i<data.length;i++){
        const v = (data[i]-128)/128;
        sum += v*v;
      }
      const rms = Math.sqrt(sum/data.length);
      // clear
      ctx.clearRect(0,0,width,height);
      // background rounded
      roundRect(ctx,0,0,width,height,9,true,false,'#eef2ff');
      const level = Math.min(1, rms * 2.8);
      const w = Math.round(level * width);
      const grad = ctx.createLinearGradient(0,0,width,0);
      grad.addColorStop(0,'#60a5fa');
      grad.addColorStop(0.6,'#f59e0b');
      grad.addColorStop(1,'#ef4444');
      roundRect(ctx,0,0,w,height,9,true,false, grad);
      // subtle border
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      roundRect(ctx,0.5,0.5,width-1,height-1,9,false,true,'#000000');
      meterAnim = requestAnimationFrame(draw);
    }
    function roundRect(c,x,y,w,h,r,fill,stroke,fillStyle){
      c.beginPath();
      c.moveTo(x+r,y);
      c.arcTo(x+w,y,x+w,y+h,r);
      c.arcTo(x+w,y+h,x,y+h,r);
      c.arcTo(x,y+h,x,y,r);
      c.arcTo(x,y,x+w,y,r);
      c.closePath();
      if(fill){
        if(fillStyle && typeof fillStyle === 'object') c.fillStyle = fillStyle;
        else if(fillStyle) c.fillStyle = fillStyle;
        else c.fillStyle = '#fff';
        c.fill();
      }
      if(stroke){
        c.stroke();
      }
    }
    draw();
    return true;
  } catch (err) {
    console.warn('startMicMeter', err);
    setMicPermission('denied or error');
    return false;
  }
}

/* stop meter */
function stopMicMeter(){
  if(meterAnim) cancelAnimationFrame(meterAnim);
  meterAnim = null;
  if(analyser){ analyser.disconnect(); analyser = null; }
  if(meterStream){ meterStream.getTracks().forEach(t => t.stop()); meterStream = null; }
  // clear canvas background
  const ctx = micMeterCanvas.getContext('2d');
  ctx.clearRect(0,0,micMeterCanvas.width,micMeterCanvas.height);
  ctx.fillStyle = '#eef2ff';
  ctx.fillRect(0,0,micMeterCanvas.width,micMeterCanvas.height);
}

/* ensure mic permission quickly */
async function ensureMicAvailable(){
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    s.getTracks().forEach(t => t.stop());
    setMicPermission('allowed');
    return true;
  } catch(e){
    console.warn('permission denied', e);
    setMicPermission('denied');
    return false;
  }
}

/* start / stop recording */
async function startRecording(){
  const ok = await ensureMicAvailable();
  if(!ok) return;
  if(!recognition){
    const okRec = initRecognition();
    if(!okRec) return;
  }
  await startMicMeter();
  transcript = '';
  liveTranscript.innerText = '';
  liveTranscript.style.display = 'block';
  feedbackBox.innerText = '';
  resultsSection.setAttribute('aria-hidden','true');
  resultsSection.style.display = 'none';
  try {
    recognition.start();
    isRecording = true;
  } catch(err){
    console.warn('start error', err);
    try { recognition.stop(); } catch(e){}
    setTimeout(()=>{ try { recognition.start(); isRecording = true; } catch(e2) { recordStatus.innerText = '❌ Unable to start'; } }, 200);
  }
}

function stopRecording(){
  isRecording = false;
  try { if(recognition) recognition.stop(); } catch(e){}
  stopMicMeter();
  recordBtn.classList.remove('listening');
  recordBtn.setAttribute('aria-pressed','false');
  recordStatus.innerText = 'Tap to start recording';
}

/* =========================
   Scoring, ring animation, fireworks and sounds
   ========================= */

/* score calculation (kept same) */
function calculateScore(original, spoken) {
  const o = original.toLowerCase().replace(/[^\w\s']/g,'').split(/\s+/).filter(w=>w.length);
  const s = (spoken||'').toLowerCase().replace(/[^\w\s']/g,'').split(/\s+/).filter(w=>w.length);
  if (s.length < o.length * 0.8) return 1;
  let exactMatches = 0;
  const used = new Set();
  o.forEach(word => {
    for(let i=0;i<s.length;i++){
      if(used.has(i)) continue;
      const sim = levenshteinSimilarity(word, s[i]);
      if(sim >= 0.85){ exactMatches++; used.add(i); break; }
    }
  });
  const accuracy = exactMatches / o.length;
  if (accuracy < 0.70) return 1;
  let score = Math.round(accuracy * 10);
  score = Math.max(1, Math.min(10, score));
  return score;
}
function levenshteinSimilarity(a,b){
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if(longer.length === 0) return 1;
  const ed = getEditDistance(longer,shorter);
  return (longer.length - ed) / longer.length;
}
function getEditDistance(a,b){
  const costs = [];
  for (let i = 0; i <= a.length; i++) {
    let last = i;
    for (let j = 0; j <= b.length; j++) {
      if (i === 0) costs[j] = j;
      else if (j > 0) {
        let newVal = costs[j - 1];
        if (a.charAt(i - 1) !== b.charAt(j - 1)) newVal = Math.min(Math.min(newVal, last), costs[j]) + 1;
        costs[j - 1] = last;
        last = newVal;
      }
    }
    if (i > 0) costs[b.length] = last;
  }
  return costs[b.length];
}

/* animate circular progress ring (score 1..10 -> percent) */
function setScoreRing(score){
  const max = 10;
  const percent = (score / max) * 100; // 0..100
  const r = 48;
  const circumference = 2 * Math.PI * r;
  const offsetTarget = circumference * (1 - percent/100);
  // animate stroke-dashoffset smoothly
  const stepMs = 12;
  const duration = 700;
  const steps = Math.max(1, Math.round(duration / stepMs));
  const startOffset = parseFloat(progressCircle.getAttribute('data-current-offset') || circumference);
  const delta = offsetTarget - startOffset;
  let step = 0;
  const startTime = performance.now();
  function animate(){
    step++;
    const t = Math.min(1, (performance.now() - startTime) / duration);
    // easeOutCubic
    const eased = 1 - Math.pow(1 - t, 3);
    const cur = startOffset + delta * eased;
    progressCircle.style.strokeDashoffset = cur;
    progressCircle.setAttribute('data-current-offset', cur);
    if(t < 1) requestAnimationFrame(animate);
  }
  // initialize strokeDasharray / offset if not set
  progressCircle.style.strokeDasharray = circumference;
  progressCircle.style.strokeDashoffset = startOffset;
  progressCircle.setAttribute('data-current-offset', startOffset);
  // run animation
  requestAnimationFrame(animate);
  // update numeric display with small pop animation
  scoreNumber.textContent = score;
  scoreNumber.animate([{ transform: 'scale(0.8)' }, { transform: 'scale(1.08)' }, { transform: 'scale(1)' }], { duration: 500, easing: 'cubic-bezier(.2,.8,.2,1)'});
}

/* celebrate with fireworks/confetti + sound when score >= 8 */
function celebrate(score) {
  if(score < 8) return;
  playCelebrationSound();
  createConfetti(120);
  // repeated fireworks bursts
  for(let i=0;i<6;i++){
    setTimeout(() => {
      createFireworks(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.6 + 80);
    }, i*300);
  }
}

/* create confetti pieces */
function createConfetti(count=80){
  overlay.style.display = 'block';
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * window.innerWidth + 'px';
    el.style.top = '-20px';
    el.style.width = (Math.random()*8 + 6) + 'px';
    el.style.height = (Math.random()*8 + 6) + 'px';
    el.style.backgroundColor = ['#FFD700','#FF69B4','#00D9FF','#FFA500','#90EE90'][Math.floor(Math.random()*5)];
    el.style.opacity = 0.95;
    overlay.appendChild(el);
    const fallDuration = 1800 + Math.random()*1200;
    el.animate([
      { transform: `translateY(0) rotate(0deg)`, opacity:1 },
      { transform: `translateY(${window.innerHeight + 200}px) rotate(${Math.random()*720}deg)`, opacity:0.95 }
    ], { duration: fallDuration, easing: 'cubic-bezier(.2,.9,.2,1)'});
    setTimeout(()=> el.remove(), fallDuration + 200);
  }
}

/* firework sparks */
function createFireworks(x,y){
  const colors = ['#FFD700','#FFA500','#FF69B4','#00D9FF','#ADFF2F'];
  const count = 22 + Math.floor(Math.random()*12);
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'firework-spark';
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    s.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    overlay.appendChild(s);
    // random velocity
    const angle = Math.random()*Math.PI*2;
    const speed = 60 + Math.random()*220;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;
    const dur = 600 + Math.random()*600;
    s.animate([
      { transform: `translate(0px,0px) scale(1)`, opacity:1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.3)`, opacity:0 }
    ], { duration: dur, easing: 'cubic-bezier(.2,.8,.2,1)'});
    setTimeout(()=> s.remove(), dur + 50);
  }
}

/* celebration sound using WebAudio — layered chord + arpeggio + burst pings */
function playCelebrationSound(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // chord (C major: C4 E4 G4)
    const chord = [261.63, 329.63, 392.00];
    chord.forEach((freq, idx) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      o.connect(g);
      g.connect(ctx.destination);
      g.gain.setValueAtTime(0, now + idx*0.02);
      g.gain.linearRampToValueAtTime(0.15, now + 0.02 + idx*0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.9 + idx*0.02);
      o.start(now + idx*0.02);
      o.stop(now + 1.0 + idx*0.02);
    });

    // arpeggio ping series
    for(let i=0;i<6;i++){
      const freq = 880 * Math.pow(1.06, i);
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0, now + 0.18 + i*0.06);
      g.gain.linearRampToValueAtTime(0.14, now + 0.18 + i*0.06 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.45 + i*0.06);
      o.start(now + 0.18 + i*0.06);
      o.stop(now + 0.48 + i*0.06);
    }

    // burst of high glitter pings
    for(let j=0;j<3;j++){
      setTimeout(() => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = 1320 + Math.random()*400;
        o.connect(g); g.connect(ctx.destination);
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0.0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        o.start(t);
        o.stop(t + 0.25);
      }, 120 * j);
    }
  } catch (e) {
    console.warn('play celebration sound failed', e);
  }
}

/* show result: compute score -> update ring -> trigger celebrate if >=8 */
function showResult(){
  const original = tongueTwistersByDifficulty[currentDifficulty][currentIndex];
  const score = calculateScore(original, transcript || '');
  // set ring and number
  // prepare circumference initial value: ensure attribute exists
  const r = 48;
  const circumference = 2 * Math.PI * r;
  // if first time, set to full offset
  if(!progressCircle.getAttribute('data-current-offset')) {
    progressCircle.setAttribute('data-current-offset', circumference);
    progressCircle.style.strokeDasharray = circumference;
    progressCircle.style.strokeDashoffset = circumference;
  }
  setScoreRing(score);
  // update feedback text
  let text = '';
  if(score >= 9) text = '🌟 Excellent pronunciation!';
  else if(score >= 7) text = '👏 Very clear speech!';
  else if(score >= 5) text = '👍 Good effort. Have another go!';
  else text = '💪 Slow down and pronounce each word clearly.';
  feedbackBox.innerText = text;
  resultsSection.style.display = 'block';
  resultsSection.setAttribute('aria-hidden','false');

  // small success sound for >=8 (big fireworks + sound)
  if(score >= 8){
    celebrate(score);
  } else {
    // gentle confirmation tone
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 660;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
      o.start(now); o.stop(now + 0.45);
    } catch (e) { console.warn(e); }
  }
}

/* =========================
   Wiring: button + basic flows
   ========================= */

recordBtn.addEventListener('click', async () => {
  if(isRecording){
    // user explicitly stops
    stopRecording();
    // if transcript exists, calculate result immediately
    if((transcript || '').trim().length > 0) showResult();
  } else {
    await startRecording();
  }
});

/* Try next / reset UX (optional) - here clicking feedback resets transcript and hides results */
resultsSection.addEventListener('click', () => {
  // small convenience to reset for next take
  transcript = '';
  liveTranscript.innerText = '';
  liveTranscript.style.display = 'none';
  resultsSection.style.display = 'none';
  feedbackBox.innerText = '';
});

/* initialize meter background + status */
(function init(){
  // draw empty meter background
  const ctx = micMeterCanvas.getContext('2d');
  ctx.clearRect(0,0,micMeterCanvas.width,micMeterCanvas.height);
  ctx.fillStyle = '#eef2ff';
  ctx.fillRect(0,0,micMeterCanvas.width,micMeterCanvas.height);
  setMicPermission('unknown');

  // prefresh init recognition object (optional)
  try { initRecognition(); } catch(e){ console.warn(e); }
})();
